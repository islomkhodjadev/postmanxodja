name: Desktop installers

# Builds the PostBaby desktop installers (.dmg on macOS, .exe on Windows, .deb on Linux).
# Trigger manually from the Actions tab — installers are uploaded as workflow artifacts.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_glob: 'desktop/build/jpackage/*.dmg'
            artifact_name: PostBaby-macOS
          - os: windows-latest
            artifact_glob: 'desktop/build/jpackage/*.exe'
            artifact_name: PostBaby-Windows
          - os: ubuntu-latest
            artifact_glob: 'desktop/build/jpackage/*.deb'
            artifact_name: PostBaby-Linux

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('desktop/**/*.gradle*', 'desktop/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build installer
        working-directory: desktop
        shell: bash
        run: ./gradlew --no-daemon jpackage

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
